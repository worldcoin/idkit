version=5.0.0

org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
# Apple targets can only build on macOS hosts; elsewhere they are disabled so
# Android-only work (CI on Linux, plain Android consumers) still builds.
kotlin.native.ignoreDisabledTargets=true
# iosMain is shared across iosArm64/iosSimulatorArm64/iosX64 and uses the
# idkit_kmp cinterop; commonization makes the cinterop API visible there.
kotlin.mpp.enableCInteropCommonization=true

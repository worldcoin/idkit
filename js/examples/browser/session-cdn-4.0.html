<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDKit Session CDN 4.0 Proof</title>
    <script src="https://cdn.jsdelivr.net/gh/worldcoin/idkit@119e65780839d8c6a6cbcc06f0c2b2ef042ae9c5/js/packages/core/dist/idkit.global.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --text: #1c1f23;
        --muted: #5f6670;
        --border: #d8d7d1;
        --accent: #245b85;
        --accent-strong: #18405f;
        --danger: #a33b35;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151719;
          --panel: #202326;
          --text: #f2f2ef;
          --muted: #a9afb7;
          --border: #383d42;
          --accent: #70a9d2;
          --accent-strong: #9ec8e7;
          --danger: #e06a63;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      section {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      label {
        display: grid;
        gap: 6px;
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      select,
      button,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      input,
      select,
      textarea {
        padding: 10px 12px;
      }

      textarea {
        min-height: 84px;
        resize: vertical;
      }

      button {
        padding: 10px 14px;
        cursor: pointer;
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      button.secondary {
        background: transparent;
        color: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .row > * {
        flex: 1;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox input {
        width: auto;
      }

      .choices {
        margin: 0 0 12px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
      }

      .choices legend {
        padding: 0 4px;
        color: var(--muted);
        font-size: 13px;
      }

      pre,
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      pre {
        margin: 0;
        min-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      a {
        color: var(--accent-strong);
        overflow-wrap: anywhere;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 760px) {
        .grid,
        .row {
          grid-template-columns: 1fr;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IDKit Session CDN 4.0 Proof</h1>
      <p>
        This page loads the CDN browser global and calls
        <code>IDKit.createSession</code> or <code>IDKit.proveSession</code> with
        selectable World ID 4.0 credential constraints. RP signatures are
        fetched from the example backend.
      </p>

      <div class="grid">
        <section>
          <label>
            App ID
            <input id="appId" value="app_d8bbd5341f16fb97a61e644b7e169c0e" />
          </label>
          <label>
            RP ID
            <input id="rpId" value="rp_7b4f23dd5fb2a826" />
          </label>
          <label>
            Existing session ID
            <textarea
              id="sessionId"
              placeholder="session_..."
              spellcheck="false"
            ></textarea>
          </label>
          <label>
            Environment
            <select id="environment">
              <option value="production">production</option>
              <option value="staging">staging</option>
            </select>
          </label>
          <label>
            Bridge URL
            <input id="bridgeUrl" placeholder="https://bridge.worldcoin.org" />
          </label>
          <fieldset class="choices">
            <legend>4.0 credential choices</legend>
            <label class="checkbox">
              <input
                type="checkbox"
                name="credential"
                value="proof_of_human"
                checked
              />
              Proof of human
            </label>
            <label class="checkbox">
              <input type="checkbox" name="credential" value="selfie" />
              Selfie
            </label>
            <label class="checkbox">
              <input type="checkbox" name="credential" value="passport" />
              Passport
            </label>
            <label class="checkbox">
              <input type="checkbox" name="credential" value="mnc" />
              MNC
            </label>
          </fieldset>
          <div class="row">
            <button id="create">Create session</button>
            <button id="prove">Prove session</button>
          </div>
          <button id="cancel" class="secondary" disabled>Cancel polling</button>
        </section>

        <section>
          <p id="status">Idle</p>
          <p>
            <a id="connector" href="#" target="_blank" rel="noreferrer"></a>
          </p>
          <pre id="output">{}</pre>
        </section>
      </div>
    </main>

    <script>
      const createButton = document.getElementById("create");
      const proveButton = document.getElementById("prove");
      const cancelButton = document.getElementById("cancel");
      const status = document.getElementById("status");
      const connector = document.getElementById("connector");
      const output = document.getElementById("output");
      let activeController = null;

      function value(id) {
        return document.getElementById(id).value.trim();
      }

      function optionalValue(id) {
        const current = value(id);
        return current ? current : undefined;
      }

      function write(data) {
        output.textContent =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      function selectedCredentials() {
        const credentials = Array.from(
          document.querySelectorAll('input[name="credential"]:checked'),
          (input) => input.value,
        );

        if (credentials.length === 0) {
          throw new Error("Select at least one 4.0 credential.");
        }

        return credentials;
      }

      function requireIDKit() {
        if (!window.IDKit) {
          throw new Error(
            "IDKit did not load from the CDN. Confirm the package was published with dist/idkit.global.js and dist/idkit_wasm_bg.wasm.",
          );
        }
        return window.IDKit;
      }

      async function fetchRpContext() {
        const response = await fetch("/api/rp-signature", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        const signature = await response.json();
        return {
          rp_id: value("rpId"),
          nonce: signature.nonce,
          created_at: signature.created_at,
          expires_at: signature.expires_at,
          signature: signature.sig,
        };
      }

      function constraints(idkit, credentials) {
        const requests = credentials.map((credential) =>
          idkit.CredentialRequest(credential),
        );

        return requests.length === 1 ? requests[0] : idkit.any(...requests);
      }

      async function runSession(mode) {
        activeController = new AbortController();
        createButton.disabled = true;
        proveButton.disabled = true;
        cancelButton.disabled = false;
        status.classList.remove("error");
        connector.textContent = "";
        connector.removeAttribute("href");
        write({});

        try {
          status.textContent = "Fetching RP signature";
          const idkit = requireIDKit();
          const rpContext = await fetchRpContext();
          const credentials = selectedCredentials();
          const config = {
            app_id: value("appId"),
            rp_context: rpContext,
            environment: value("environment"),
            bridge_url: optionalValue("bridgeUrl"),
          };

          status.textContent =
            mode === "create"
              ? "Creating session request"
              : "Creating proof request";

          const request =
            mode === "create"
              ? await idkit
                  .createSession(config)
                  .constraints(constraints(idkit, credentials))
              : await idkit
                  .proveSession(value("sessionId"), config)
                  .constraints(constraints(idkit, credentials));

          connector.href = request.connectorURI;
          connector.textContent = request.connectorURI;
          write({ request_id: request.requestId, credentials });

          status.textContent = "Waiting for proof";
          const completion = await request.pollUntilCompletion({
            pollInterval: 2000,
            timeout: 120000,
            signal: activeController.signal,
          });

          status.textContent = completion.success ? "Confirmed" : "Failed";
          write(completion);

          if (completion.success && completion.result.session_id) {
            document.getElementById("sessionId").value =
              completion.result.session_id;
          }
        } catch (error) {
          status.classList.add("error");
          status.textContent = error.message;
        } finally {
          createButton.disabled = false;
          proveButton.disabled = false;
          cancelButton.disabled = true;
          activeController = null;
        }
      }

      createButton.addEventListener("click", () => runSession("create"));
      proveButton.addEventListener("click", () => runSession("prove"));
      cancelButton.addEventListener("click", () => {
        activeController?.abort();
      });
    </script>
  </body>
</html>

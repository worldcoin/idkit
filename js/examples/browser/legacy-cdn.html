<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDKit Legacy CDN Proof</title>
    <script src="https://cdn.jsdelivr.net/gh/worldcoin/idkit@119e65780839d8c6a6cbcc06f0c2b2ef042ae9c5/js/packages/core/dist/idkit.global.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --text: #1c1f23;
        --muted: #5f6670;
        --border: #d8d7d1;
        --accent: #126a5c;
        --accent-strong: #0d4f45;
        --danger: #a33b35;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151719;
          --panel: #202326;
          --text: #f2f2ef;
          --muted: #a9afb7;
          --border: #383d42;
          --accent: #52b7a5;
          --accent-strong: #7ed0c1;
          --danger: #e06a63;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      section {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      label {
        display: grid;
        gap: 6px;
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      select,
      button,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      input,
      select,
      textarea {
        padding: 10px 12px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        padding: 10px 14px;
        cursor: pointer;
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      button.secondary {
        background: transparent;
        color: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .row > * {
        flex: 1;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox input {
        width: auto;
      }

      pre,
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      pre {
        margin: 0;
        min-height: 180px;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      a {
        color: var(--accent-strong);
        overflow-wrap: anywhere;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 760px) {
        .grid,
        .row {
          grid-template-columns: 1fr;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IDKit Legacy CDN Proof</h1>
      <p>
        This page loads the CDN browser global from
        <code>@worldcoin/idkit-core</code> and creates a proof with selectable
        legacy migration presets. RP signatures are fetched from the example
        backend.
      </p>

      <div class="grid">
        <section>
          <label>
            App ID
            <input id="appId" value="app_d8bbd5341f16fb97a61e644b7e169c0e" />
          </label>
          <label>
            RP ID
            <input id="rpId" value="rp_7b4f23dd5fb2a826" />
          </label>
          <label>
            Action
            <input id="action" value="legacy-cdn-demo" />
          </label>
          <label>
            Signal
            <input id="signal" value="legacy-cdn-user-123" />
          </label>
          <label>
            Credential preset
            <select id="credentialPreset">
              <option value="proofOfHuman">
                Proof of human, 4.0 with legacy Orb fallback
              </option>
              <option value="passport">
                Passport, 4.0 with legacy document fallback
              </option>
              <option value="mnc">
                MNC, 4.0 with legacy document fallback
              </option>
              <option value="identityCheck">
                Identity check, 4.0 with legacy signal
              </option>
              <option value="orbLegacy">Orb legacy only</option>
              <option value="secureDocumentLegacy">
                Secure document legacy only
              </option>
              <option value="documentLegacy">Document legacy only</option>
              <option value="deviceLegacy">Device legacy only</option>
              <option value="selfieCheckLegacy">
                Selfie check legacy only
              </option>
            </select>
          </label>
          <label>
            Environment
            <select id="environment">
              <option value="production">production</option>
              <option value="staging">staging</option>
            </select>
          </label>
          <label>
            Bridge URL
            <input id="bridgeUrl" placeholder="https://bridge.worldcoin.org" />
          </label>
          <label class="checkbox">
            <input id="allowLegacy" type="checkbox" checked />
            Allow legacy proofs during migration
          </label>
          <div class="row">
            <button id="start">Create legacy CDN request</button>
            <button id="cancel" class="secondary" disabled>
              Cancel polling
            </button>
          </div>
        </section>

        <section>
          <p id="status">Idle</p>
          <p>
            <a id="connector" href="#" target="_blank" rel="noreferrer"></a>
          </p>
          <pre id="output">{}</pre>
        </section>
      </div>
    </main>

    <script>
      const startButton = document.getElementById("start");
      const cancelButton = document.getElementById("cancel");
      const status = document.getElementById("status");
      const connector = document.getElementById("connector");
      const output = document.getElementById("output");
      let activeController = null;

      function value(id) {
        return document.getElementById(id).value.trim();
      }

      function optionalValue(id) {
        const current = value(id);
        return current ? current : undefined;
      }

      function write(data) {
        output.textContent =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      function selectedPreset(idkit) {
        const signal = value("signal");
        const preset = value("credentialPreset");

        switch (preset) {
          case "proofOfHuman":
            return idkit.proofOfHuman({ signal });
          case "passport":
            return idkit.passport({ signal });
          case "mnc":
            return idkit.mnc({ signal });
          case "identityCheck":
            return idkit.identityCheck({
              attributes: [{ type: "minimum_age", value: 18 }],
              legacy_signal: signal,
            });
          case "orbLegacy":
            return idkit.orbLegacy({ signal });
          case "secureDocumentLegacy":
            return idkit.secureDocumentLegacy({ signal });
          case "documentLegacy":
            return idkit.documentLegacy({ signal });
          case "deviceLegacy":
            return idkit.deviceLegacy({ signal });
          case "selfieCheckLegacy":
            return idkit.selfieCheckLegacy({ signal });
          default:
            throw new Error(`Unsupported credential preset: ${preset}`);
        }
      }

      function requireIDKit() {
        if (!window.IDKit) {
          throw new Error(
            "IDKit did not load from the CDN. Confirm the package was published with dist/idkit.global.js and dist/idkit_wasm_bg.wasm.",
          );
        }
        return window.IDKit;
      }

      async function fetchRpContext() {
        const response = await fetch("/api/rp-signature", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: value("action") }),
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        const signature = await response.json();
        return {
          rp_id: value("rpId"),
          nonce: signature.nonce,
          created_at: signature.created_at,
          expires_at: signature.expires_at,
          signature: signature.sig,
        };
      }

      startButton.addEventListener("click", async () => {
        activeController = new AbortController();
        startButton.disabled = true;
        cancelButton.disabled = false;
        status.classList.remove("error");
        connector.textContent = "";
        connector.removeAttribute("href");
        write({});

        try {
          status.textContent = "Fetching RP signature";
          const idkit = requireIDKit();
          const rpContext = await fetchRpContext();
          const preset = selectedPreset(idkit);

          status.textContent = "Creating IDKit request";
          const request = await idkit
            .request({
              app_id: value("appId"),
              action: value("action"),
              rp_context: rpContext,
              allow_legacy_proofs:
                document.getElementById("allowLegacy").checked,
              environment: value("environment"),
              bridge_url: optionalValue("bridgeUrl"),
            })
            .preset(preset);

          connector.href = request.connectorURI;
          connector.textContent = request.connectorURI;
          write({
            request_id: request.requestId,
            credential_preset: value("credentialPreset"),
          });

          status.textContent = "Waiting for proof";
          const completion = await request.pollUntilCompletion({
            pollInterval: 2000,
            timeout: 120000,
            signal: activeController.signal,
          });

          status.textContent = completion.success ? "Confirmed" : "Failed";
          write(completion);
        } catch (error) {
          status.classList.add("error");
          status.textContent = error.message;
        } finally {
          startButton.disabled = false;
          cancelButton.disabled = true;
          activeController = null;
        }
      });

      cancelButton.addEventListener("click", () => {
        activeController?.abort();
      });
    </script>
  </body>
</html>

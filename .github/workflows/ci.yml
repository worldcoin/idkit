name: CI
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust-core:
    name: Rust Core - Build & Test
    runs-on:
      group: arc-public-large-amd64-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}
          components: rustfmt,clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Rust core
        run: cargo build --release --package idkit-core

      - name: Run Rust tests
        run: cargo test --package idkit-core

  go-server:
    name: Go Server - Build & Test
    runs-on:
      group: arc-public-large-amd64-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/idkit/go.mod

      - name: Check formatting
        working-directory: go/idkit
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Run: gofmt -w ."
            gofmt -l .
            exit 1
          fi

      - name: Run Go tests
        working-directory: go/idkit
        run: go test ./...

  go-rust-parity:
    name: Go ↔ Rust Parity Tests
    runs-on:
      group: arc-public-large-amd64-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/idkit/go.mod

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build rp-sign-vectors binary
        run: cargo build --release -p idkit-core --bin rp-sign-vectors --features rp-signature

      - name: Run Go parity tests
        working-directory: go/idkit
        run: go test -tags rust_parity -v ./...

  swift-bindings:
    name: Swift Bindings - Build & Test
    runs-on: ${{ matrix.os }}
    needs: rust-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            xcode: "26.0.1"
          - os: macos-26
            xcode: "26.1.1"
          - os: macos-26
            xcode: "26.2"
          - os: macos-26
            xcode: "26.3"
          # - os: macos-26
          #   xcode: "26.4"
          # - os: macos-26
          #   xcode: "26.5-beta"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set Xcode developer directory
        run: |
          XCODE_APP_VERSION="${{ matrix.xcode }}"
          XCODE_APP_VERSION="${XCODE_APP_VERSION//-/_}"
          echo "DEVELOPER_DIR=/Applications/Xcode_${XCODE_APP_VERSION}.app/Contents/Developer" >> "$GITHUB_ENV"

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Restore Swift .build cache
        id: restore-swift-build
        uses: actions/cache/restore@v4
        with:
          path: swift/.build
          restore-keys: "swiftpm-build-${{ runner.os }}-${{ matrix.xcode }}-"
          key: "swiftpm-build-${{ runner.os }}-${{ matrix.xcode }}-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}"

      - name: Build Swift artifacts (Rust + XCFramework + Bindings)
        run: bash scripts/package-swift.sh

      - name: Build Swift package
        working-directory: swift
        run: swift build

      - name: Run Swift tests
        working-directory: swift
        run: set -o pipefail; xcodebuild test -scheme IDKit -destination "platform=macOS" | xcbeautify

      - name: Check Swift sample app destinations
        id: check-destinations
        run: |
          xcodebuild -version

          DESTINATIONS=$(xcodebuild -showdestinations \
            -project swift/Examples/IDKitSampleApp/IDKitSampleApp.xcodeproj \
            -scheme IDKitSampleApp 2>&1)
          echo "$DESTINATIONS"
          if echo "$DESTINATIONS" | grep -q "Available destinations"; then
            echo "has_destinations=true" >> $GITHUB_OUTPUT
          else
            echo "has_destinations=false" >> $GITHUB_OUTPUT
            echo "No available destinations — skipping build"
          fi

      - name: Download iOS platform
        if: steps.check-destinations.outputs.has_destinations == 'false'
        run: xcodebuild -downloadPlatform iOS

      - name: Build Swift sample app for iOS
        run: |
          set -o pipefail; xcodebuild \
            -project swift/Examples/IDKitSampleApp/IDKitSampleApp.xcodeproj \
            -scheme IDKitSampleApp \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify

      - name: Build Swift sample app for iOS Simulator
        run: |
          set -o pipefail; xcodebuild \
            -project swift/Examples/IDKitSampleApp/IDKitSampleApp.xcodeproj \
            -scheme IDKitSampleApp \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify

      - name: Cache Swift .build
        if: steps.restore-swift-build.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: swift/.build
          key: "swiftpm-build-${{ runner.os }}-${{ matrix.xcode }}-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}"

  js-packages:
    name: JavaScript - Build & Test
    runs-on:
      group: arc-public-large-amd64-runner
    needs: rust-core
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm lint:js

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

  kotlin-bindings:
    name: Kotlin Bindings - Build (multi-ABI)
    runs-on: ubuntu-latest
    needs: rust-core
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /opt/hostedtoolcache/CodeQL \
                      /usr/share/dotnet \
                      /opt/ghc || true
          sudo apt-get clean
          docker system prune -af || true
          docker volume prune -f || true
          docker builder prune -af || true
          df -h

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cross (for Android targets, if not cached)
        run: command -v cross || cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build Kotlin native libraries (host + Android ABIs)
        run: ./scripts/build-kotlin.sh

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools platforms;android-35 build-tools;35.0.0

      # iOS targets are disabled on Linux (kotlin.native.ignoreDisabledTargets);
      # this runs commonTest on the host JVM against the host libidkit_kmp.
      - name: Run tests
        working-directory: kotlin/
        run: ./gradlew :idkit:testReleaseUnitTest

      - name: Build Kotlin sample app
        working-directory: kotlin/Examples/IDKitSampleApp
        run: ./gradlew :app:assembleDebug

      - name: Build KMP sample app (Android)
        working-directory: kotlin/Examples/IDKitKmpSampleApp
        run: ./gradlew :androidApp:assembleDebug

      # Validates the Android slice of the KMP publication. The iOS variants and
      # complete root metadata can only be produced on macOS; the publish workflow
      # runs there and the build fails remote publishing from non-Mac hosts.
      - name: Validate Kotlin Maven publication (Android slice)
        run: |
          set -euo pipefail

          ./kotlin/gradlew -p kotlin :idkit:publishToMavenLocal
          ./kotlin/gradlew -p kotlin \
            -Pidkit.publish.mavenCentral=true \
            :idkit:publishToMavenCentral --dry-run

          VERSION="$(grep '^version=' kotlin/gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          REPO="$HOME/.m2/repository/com/worldcoin"
          ROOT_BASE="$REPO/idkit/$VERSION/idkit-$VERSION"
          ANDROID_BASE="$REPO/idkit-android/$VERSION/idkit-android-$VERSION"

          for artifact in \
            "$ROOT_BASE.pom" \
            "$ROOT_BASE.module" \
            "$ANDROID_BASE.aar" \
            "$ANDROID_BASE.pom" \
            "$ANDROID_BASE.module" \
            "$ANDROID_BASE-sources.jar"; do
            if [ ! -s "$artifact" ]; then
              echo "::error::Missing Maven publication artifact: $artifact"
              exit 1
            fi
          done

          grep -q '<groupId>com.worldcoin</groupId>' "$ROOT_BASE.pom"
          grep -q '<artifactId>idkit</artifactId>' "$ROOT_BASE.pom"
          grep -q '<packaging>aar</packaging>' "$ANDROID_BASE.pom"

          AAR_CONTENTS="$(mktemp)"
          jar tf "$ANDROID_BASE.aar" > "$AAR_CONTENTS"
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            if ! grep -q "^jni/$abi/libidkit_kmp.so$" "$AAR_CONTENTS"; then
              echo "::error::Missing native library in AAR: jni/$abi/libidkit_kmp.so"
              exit 1
            fi
          done

  kotlin-ios:
    name: Kotlin SDK - iOS targets (macOS)
    runs-on: macos-latest
    needs: rust-core
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools platforms;android-35 build-tools;35.0.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: kotlin-ios

      - name: Build Kotlin native libraries (host + iOS)
        run: SKIP_ANDROID=1 ./scripts/build-kotlin.sh

      # commonTest on the iOS simulator: exercises the cinterop bridge and the
      # statically linked Rust core on Kotlin/Native.
      - name: Run iOS simulator tests
        working-directory: kotlin/
        run: ./gradlew :idkit:iosSimulatorArm64Test

      # Rehearse the full multi-target publication so release-day breakage in
      # variant metadata or publication wiring is caught on PRs (the release
      # itself is the first time the real publish tasks otherwise run). The
      # rehearsal flag skips the Android .so check — mac runners cannot
      # cross-build them — and remote publishing rejects that flag, so it
      # cannot leak into a release.
      - name: Rehearse full KMP publication (Maven Local)
        run: |
          set -euo pipefail

          ./kotlin/gradlew -p kotlin :idkit:publishToMavenLocal \
            -Pidkit.rehearsal.allowMissingAndroidNativeLibs=true

          VERSION="$(grep '^version=' kotlin/gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          REPO="$HOME/.m2/repository/com/worldcoin"

          for module in idkit-iosarm64 idkit-iossimulatorarm64 idkit-iosx64; do
            for ext in klib pom module; do
              artifact="$REPO/$module/$VERSION/$module-$VERSION.$ext"
              if [ ! -s "$artifact" ]; then
                echo "::error::Missing Maven publication artifact: $artifact"
                exit 1
              fi
            done
          done

          # The root module metadata is what consumers resolve; every target
          # variant must be present in it.
          ROOT_MODULE="$REPO/idkit/$VERSION/idkit-$VERSION.module"
          for variant in \
            releaseApiElements-published \
            iosArm64ApiElements-published \
            iosSimulatorArm64ApiElements-published \
            iosX64ApiElements-published; do
            if ! grep -q "\"$variant\"" "$ROOT_MODULE"; then
              echo "::error::Root Gradle module metadata is missing variant: $variant"
              exit 1
            fi
          done

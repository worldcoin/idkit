name: Publish Kotlin Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to publish as dev release (leave empty for HEAD)"
        required: false
        type: string
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Release
    # Dev releases (workflow_dispatch) are only allowed from main
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.version }}
      environment: ${{ steps.release-type.outputs.environment }}
      ref: ${{ steps.release-type.outputs.ref }}
      should_publish: ${{ steps.release-type.outputs.should_publish }}

    steps:
      - name: Determine release type
        id: release-type
        # Use env vars instead of direct ${{ }} interpolation in run scripts
        # to prevent command injection via crafted PR labels or workflow inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
          GH_SHA: ${{ github.sha }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Release type: dev"
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
            if [ -n "$INPUT_COMMIT_SHA" ]; then
              echo "ref=$INPUT_COMMIT_SHA" >> $GITHUB_OUTPUT
            else
              echo "ref=$GH_SHA" >> $GITHUB_OUTPUT
            fi
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$PR_MERGED" = "true" ] && \
               echo "$PR_LABELS" | grep -q '"release"' && \
               echo "$PR_BODY" | grep -q "<!-- release_target:kotlin -->"; then
              echo "Release type: production"
              echo "environment=production" >> $GITHUB_OUTPUT
              echo "should_publish=true" >> $GITHUB_OUTPUT
              echo "ref=$GH_SHA" >> $GITHUB_OUTPUT
            else
              echo "PR not merged with release label, skipping"
              echo "should_publish=false" >> $GITHUB_OUTPUT
              echo "environment=" >> $GITHUB_OUTPUT
              echo "ref=" >> $GITHUB_OUTPUT
            fi
          else
            echo "Unknown event, skipping"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "environment=" >> $GITHUB_OUTPUT
            echo "ref=" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.release-type.outputs.should_publish == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release-type.outputs.ref }}
          fetch-depth: 0

      - name: Validate commit exists on main
        if: steps.release-type.outputs.should_publish == 'true' && github.event_name == 'workflow_dispatch'
        env:
          TARGET_REF: ${{ steps.release-type.outputs.ref }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$TARGET_REF" origin/main; then
            echo "::error::Commit $TARGET_REF is not on the main branch. Dev releases can only be published from merged code."
            exit 1
          fi

      - name: Generate version
        if: steps.release-type.outputs.should_publish == 'true'
        id: version
        run: |
          BASE_VERSION=$(grep '^version=' kotlin/gradle.properties | cut -d= -f2- | tr -d '[:space:]')
          if [ -z "$BASE_VERSION" ]; then
            echo "Error: Failed to resolve version from kotlin/gradle.properties"
            exit 1
          fi

          if [ "${{ steps.release-type.outputs.environment }}" = "development" ]; then
            SHORT_SHA=$(echo "${{ steps.release-type.outputs.ref }}" | cut -c1-7)
            VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
            echo "Dev version: $VERSION"
          else
            VERSION="$BASE_VERSION"
            echo "Production version: $VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-android:
    name: Build Android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
          - target: i686-linux-android
            abi: x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          echo "Removing unnecessary packages and files..."
          sudo rm -rf /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /usr/local/graalvm \
                      /usr/local/.ghcup \
                      /usr/local/share/powershell \
                      /usr/local/share/chromium \
                      /usr/local/lib/node_modules \
                      /usr/local/share/boost || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          docker system prune -af || true
          echo "Disk space after cleanup:"
          df -h

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.abi }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      # kmp-android-release (panic=unwind) is required so the FFI layer's
      # catch_unwind can convert panics into error envelopes instead of
      # aborting the host app. Do NOT switch to android-release (panic=abort).
      - name: Build Android ${{ matrix.abi }}
        run: |
          echo "Building for ${{ matrix.target }} -> ${{ matrix.abi }}"
          CARGO_HOME=/tmp RUSTFLAGS="-C link-arg=-Wl,-z,max-page-size=16384 -C link-arg=-Wl,-z,common-page-size=4096" CROSS_NO_WARNINGS=1 cross build --package idkit-kmp-ffi --target ${{ matrix.target }} --profile kmp-android-release --locked

          mkdir -p android-libs/${{ matrix.abi }}
          cp target/${{ matrix.target }}/kmp-android-release/libidkit_kmp.so android-libs/${{ matrix.abi }}/

          echo "Cleaning up Docker resources..."
          docker system prune -f || true

      - name: Upload Android ${{ matrix.abi }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-android-${{ matrix.abi }}
          path: android-libs/${{ matrix.abi }}/
          retention-days: 1

  publish:
    name: Publish
    # KMP publishing must run on macOS: the iOS klib variants and complete root
    # module metadata can only be produced where the Apple targets are enabled.
    # The Gradle build hard-fails remote publishing from non-Mac hosts.
    runs-on: macos-latest
    needs: [prepare, build-android]
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kotlin-android-*
          path: android-libs-temp
          merge-multiple: false

      - name: Organize Android libraries
        run: |
          mkdir -p kotlin/idkit/src/androidMain/jniLibs

          for abi_dir in android-libs-temp/kotlin-android-*; do
            abi=$(basename "$abi_dir" | sed 's/kotlin-android-//')
            echo "Processing $abi..."
            mkdir -p "kotlin/idkit/src/androidMain/jniLibs/$abi"
            if [ ! -s "$abi_dir/libidkit_kmp.so" ]; then
              echo "ERROR: expected libidkit_kmp.so in $abi_dir"
              ls -la "$abi_dir" || true
              exit 1
            fi
            cp "$abi_dir/libidkit_kmp.so" "kotlin/idkit/src/androidMain/jniLibs/$abi/"
          done

          echo "Final jniLibs structure:"
          find kotlin/idkit/src/androidMain/jniLibs -name "*.so"

      - name: Read rust-toolchain
        id: rust-version
        run: echo "toolchain=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.toolchain }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: publish-ios

      - name: Build iOS static libraries
        run: SKIP_ANDROID=1 ./scripts/build-kotlin.sh

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools platforms;android-35 build-tools;35.0.0

      - name: Build Kotlin artifacts
        working-directory: kotlin/
        run: ./gradlew :idkit:assemble
        env:
          PKG_VERSION: ${{ needs.prepare.outputs.version }}

      # Production only. The -Pidkit.publish.mavenCentral=true flag registers the
      # Maven Central repository and signing tasks; without it (every dev release) the
      # step below publishes to GitHub Packages alone.
      #
      # This task only UPLOADS the deployment to the Central Portal and returns; Portal
      # validation is asynchronous. The next step polls until the deployment validates,
      # so GitHub Packages does not publish if Central validation fails. USER_MANAGED
      # then leaves the validated deployment awaiting a manual Publish in the Portal UI,
      # the final gate on what actually goes live on Maven Central.
      - name: Publish to Maven Central
        if: needs.prepare.outputs.environment == 'production'
        working-directory: kotlin/
        run: ./gradlew :idkit:publishToMavenCentral -Pidkit.publish.mavenCentral=true
        env:
          PKG_VERSION: ${{ needs.prepare.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_KEY_PASSWORD }}

      # Gate GitHub Packages on Central validation. The upload above returns before the
      # Portal finishes its asynchronous validation, so without this a validation failure
      # would still let GitHub Packages publish. Poll the "download from a validated
      # deployment" endpoint, which returns 200 only once the deployment is VALIDATED.
      - name: Wait for Maven Central validation
        if: needs.prepare.outputs.environment == 'production'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          PKG_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          TOKEN=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')
          URL="https://central.sonatype.com/api/v1/publisher/deployments/download/com/worldcoin/idkit/${PKG_VERSION}/idkit-${PKG_VERSION}.pom"
          for i in $(seq 1 120); do
            # `|| echo 000` keeps a transient curl transport error (DNS/connection/
            # timeout) from tripping the runner's `set -e` and aborting the release;
            # 000 is not 200, so the loop simply retries.
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$URL" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "Maven Central deployment for $PKG_VERSION validated."
              exit 0
            fi
            echo "Not validated yet (HTTP $CODE); attempt $i/120, retrying in 15s..."
            sleep 15
          done
          echo "::error::Maven Central deployment for $PKG_VERSION did not validate within ~30 minutes; skipping GitHub Packages. Check the Central Portal."
          exit 1

      # GitHub Packages uploads are not atomic across the KMP modules, so publish
      # the target modules first and the root module LAST. Consumers resolve the
      # root module metadata; root-last means a partial failure leaves the version
      # unresolvable (safe to retry) instead of resolvable-but-missing-variants.
      # Two Gradle invocations because task order within one is not guaranteed.
      - name: Publish to GitHub Packages
        working-directory: kotlin/
        run: |
          ./gradlew \
            :idkit:publishAndroidReleasePublicationToGithubPackagesRepository \
            :idkit:publishIosArm64PublicationToGithubPackagesRepository \
            :idkit:publishIosSimulatorArm64PublicationToGithubPackagesRepository \
            :idkit:publishIosX64PublicationToGithubPackagesRepository
          ./gradlew :idkit:publishKotlinMultiplatformPublicationToGithubPackagesRepository
        env:
          PKG_VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}

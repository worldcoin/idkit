name: IDKitSampleApp
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: 15.0
packages:
  IDKit:
    path: ../..
targets:
  IDKitSampleApp:
    type: application
    platform: iOS
    deploymentTarget: 15.0
    sources:
      - path: IDKitSampleApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.worldcoin.idkit.sample
        INFOPLIST_FILE: IDKitSampleApp/Info.plist
        SWIFT_VERSION: 5.9
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: IDKit
        product: IDKit
schemes:
  IDKitSampleApp:
    build:
      targets:
        IDKitSampleApp: all
      preActions:
        - script: |
            REPO_ROOT="${SRCROOT}/../../.."
            XCFRAMEWORK="${REPO_ROOT}/IDKitFFI.xcframework"
            GENERATED="${REPO_ROOT}/swift/Sources/IDKit/Generated/idkit_core.swift"
            RUST_SRC="${REPO_ROOT}/rust/core/src"

            NEEDS_BUILD=0

            if [ ! -d "${XCFRAMEWORK}" ] || [ ! -f "${GENERATED}" ]; then
              NEEDS_BUILD=1
            elif [ -n "$(find "${RUST_SRC}" -newer "${GENERATED}" -name '*.rs' -print -quit)" ]; then
              NEEDS_BUILD=1
            fi

            if [ "${NEEDS_BUILD}" -eq 1 ]; then
              echo "note: IDKit native artifacts missing or stale — rebuilding..."
              "${REPO_ROOT}/scripts/package-swift.sh"
            fi
          name: Build IDKit Dependencies
          settingsTarget: IDKitSampleApp
    run:
      config: Debug
    test:
      config: Debug
